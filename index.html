<!-- Aviso de Cookies -->

<div id="cookie-banner">
    <div class="cookie-content">
        <p>
            Este sitio utiliza cookies técnicas y de análisis para mejorar la
            experiencia de navegación y comprender el uso general del sitio.
            Al continuar navegando, aceptas el uso de cookies conforme a nuestra
            Política de Cookies.
        </p>

        <button onclick="aceptarCookies()">
            Aceptar
        </button>
    </div>
</div>

<style>

#cookie-banner{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#1B5E20;
    color:white;
    padding:15px;
    z-index:99999;
    box-shadow:0 -2px 10px rgba(0,0,0,.2);
}

.cookie-content{
    max-width:1200px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
}

.cookie-content button{
    background:white;
    color:#1B5E20;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

@media(max-width:768px){

.cookie-content{
    flex-direction:column;
    text-align:center;
}

}

</style>

<script>

function aceptarCookies(){
    localStorage.setItem('cookiesAceptadas','si');
    document.getElementById('cookie-banner').style.display='none';
}

window.onload=function(){

    if(localStorage.getItem('cookiesAceptadas')==='si'){
        document.getElementById('cookie-banner').style.display='none';
    }

}

</script>
